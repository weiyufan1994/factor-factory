  <h1>高频价量相关性因子（CPV）最小样本</h1>
  <h2>摘要</h2>
  <p>本文展示一个最小化的因子研报样本，用于 Step 1 HTML ingestion 复现。</p>
  <h2>核心观点</h2>
  <p>过去20个交易日内，分钟收盘价与分钟成交量相关系数的均值、波动与趋势，可以构成选股因子。</p>
  <h2>关键变量</h2>
  <ul>
    <li>分钟收盘价</li>
    <li>分钟成交量</li>
    <li>20日收益率（Ret20）</li>
    <li>20日波动率（Vol20）</li>
    <li>总市值或其代理变量</li>
  </ul>
  <h2>结论</h2>
  <p>最终因子记作 CPV，用于月度调仓的横截面选股。</p>
</body>
